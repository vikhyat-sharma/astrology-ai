# Training configuration for astrology AI model
model:
  # Base model configuration
  base_model: "microsoft/DialoGPT-medium"
  model_type: "gpt2"
  torch_dtype: "float16"

  # LoRA configuration for fine-tuning
  lora:
    r: 16
    lora_alpha: 32
    lora_dropout: 0.05
    bias: "none"
    task_type: "CAUSAL_LM"
    target_modules:
      - "c_attn"
      - "c_proj"
      - "c_fc"
      - "lm_head"

training:
  # Training hyperparameters
  output_dir: "./models/astrology-ai"
  num_train_epochs: 3  # Increased for better learning with more data
  max_steps: 500  # Limit steps for controlled training
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 4  # Effective batch size = 8
  learning_rate: 0.00002  # Lower learning rate for stability
  weight_decay: 0.01
  warmup_steps: 50  # Warmup for stable training
  logging_steps: 10
  save_steps: 50
  eval_steps: 50
  save_total_limit: 3

  # Optimization
  optim: "adamw_torch"
  lr_scheduler_type: "cosine"
  gradient_checkpointing: false
  fp16: false
  bf16: false

  # Data loading
  dataloader_num_workers: 2
  dataloader_pin_memory: false

  # Training control
  resume_from_checkpoint: null
  seed: 42
  data_seed: 42

# Data configuration
data:
  train_file: "data/processed/train.jsonl"
  validation_file: "data/processed/validation.jsonl"
  test_file: "data/processed/test.jsonl"

  # Data collator
  max_length: 512
  padding: "max_length"
  truncation: true

# Generation configuration
generation:
  max_new_tokens: 256
  temperature: 0.7
  top_p: 0.9
  top_k: 50
  repetition_penalty: 1.1
  do_sample: true
  pad_token_id: 2
  eos_token_id: 2

# Logging and monitoring
logging:
  wandb:
    enabled: true
    project: "astrology-ai-training"
    name: null  # Will be set to model name
    tags:
      - "astrology"
      - "fine-tuning"
      - "llama2"

  local:
    log_level: "INFO"
    log_file: "logs/training.log"

# Hardware configuration
hardware:
  device: "auto"  # auto, cuda, cpu
  device_map: "auto"
  max_memory:
    0: "24GB"
    1: "24GB"