# Training configuration for astrology AI model
model:
  # Base model configuration
  base_model: "meta-llama/Llama-2-7b-hf"
  model_type: "llama"
  torch_dtype: "float16"

  # LoRA configuration for fine-tuning
  lora:
    r: 16
    lora_alpha: 32
    lora_dropout: 0.05
    bias: "none"
    task_type: "CAUSAL_LM"
    target_modules:
      - "q_proj"
      - "k_proj"
      - "v_proj"
      - "o_proj"
      - "gate_proj"
      - "up_proj"
      - "down_proj"
      - "lm_head"

training:
  # Training hyperparameters
  output_dir: "./models/astrology-ai"
  num_train_epochs: 3
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 2
  learning_rate: 2e-4
  weight_decay: 0.01
  warmup_steps: 100
  logging_steps: 10
  save_steps: 500
  eval_steps: 500
  save_total_limit: 3

  # Optimization
  optim: "adamw_torch"
  lr_scheduler_type: "cosine"
  gradient_checkpointing: true
  fp16: true
  bf16: false

  # Data loading
  dataloader_num_workers: 4
  dataloader_pin_memory: true

  # Training control
  resume_from_checkpoint: null
  seed: 42
  data_seed: 42

# Data configuration
data:
  train_file: "data/processed/train.jsonl"
  validation_file: "data/processed/validation.jsonl"
  test_file: "data/processed/test.jsonl"

  # Data collator
  max_length: 512
  padding: "max_length"
  truncation: true

# Generation configuration
generation:
  max_new_tokens: 256
  temperature: 0.7
  top_p: 0.9
  top_k: 50
  repetition_penalty: 1.1
  do_sample: true
  pad_token_id: 2
  eos_token_id: 2

# Logging and monitoring
logging:
  wandb:
    enabled: true
    project: "astrology-ai-training"
    name: null  # Will be set to model name
    tags:
      - "astrology"
      - "fine-tuning"
      - "llama2"

  local:
    log_level: "INFO"
    log_file: "logs/training.log"

# Hardware configuration
hardware:
  device: "auto"  # auto, cuda, cpu
  device_map: "auto"
  max_memory:
    0: "24GB"
    1: "24GB"